<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #030404;
      }

      body {
        font-family: "IBM Plex Mono", monospace;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background:
          radial-gradient(circle at 49% 50%, rgba(157, 168, 168, 0.16), transparent 34%),
          radial-gradient(circle at 20% 76%, rgba(247, 247, 242, 0.08), transparent 28%),
          #030404;
      }

      .grain,
      .grid,
      .scan,
      .logo-stage,
      .drawing-layer,
      .logo-final,
      .logo-ghost,
      .vignette {
        position: absolute;
        inset: 0;
      }

      .grain {
        z-index: 2;
        opacity: 0.28;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.014) 1px, transparent 1px);
        background-size: 6px 6px, 8px 8px;
        mix-blend-mode: screen;
      }

      .grid {
        z-index: 1;
        opacity: 0.16;
        background-image:
          linear-gradient(rgba(223, 227, 221, 0.11) 1px, transparent 1px),
          linear-gradient(90deg, rgba(223, 227, 221, 0.09) 1px, transparent 1px);
        background-size: 96px 96px;
        transform-origin: 50% 50%;
      }

      .scan {
        z-index: 7;
        opacity: 0;
        width: 420px;
        left: -520px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(247, 247, 242, 0.03) 20%,
          rgba(247, 247, 242, 0.24) 50%,
          rgba(247, 247, 242, 0.035) 80%,
          transparent 100%
        );
        filter: blur(16px);
        mix-blend-mode: screen;
      }

      .logo-stage {
        z-index: 4;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 144px 200px;
      }

      .logo-wrap {
        position: relative;
        width: 1500px;
        height: 950px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo-final,
      .logo-ghost {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .logo-final {
        z-index: 6;
        opacity: 0;
        filter: drop-shadow(0 0 26px rgba(247, 247, 242, 0.16));
      }

      .logo-ghost {
        background: url("assets/horizon-logo.png") center / contain no-repeat;
        z-index: 3;
        opacity: 0;
        filter: blur(18px) drop-shadow(0 0 54px rgba(247, 247, 242, 0.35));
      }

      .drawing-layer {
        z-index: 5;
        overflow: visible;
      }

      .draw-line,
      .flow-line,
      .spark-line {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        vector-effect: non-scaling-stroke;
      }

      .draw-line {
        stroke: #f7f7f2;
        stroke-width: 8;
        filter: drop-shadow(0 0 13px rgba(247, 247, 242, 0.42));
      }

      .flow-line {
        stroke: #dfe3dd;
        stroke-width: 2.5;
        opacity: 0;
        stroke-dasharray: 80 520;
        filter: drop-shadow(0 0 16px rgba(247, 247, 242, 0.7));
      }

      .spark-line {
        stroke: #9da8a8;
        stroke-width: 1.5;
        opacity: 0;
        stroke-dasharray: 22 210;
        filter: drop-shadow(0 0 10px rgba(157, 168, 168, 0.8));
      }

      .draft-mark {
        position: absolute;
        z-index: 3;
        width: 1px;
        height: 520px;
        top: 238px;
        background: linear-gradient(180deg, transparent, rgba(247, 247, 242, 0.35), transparent);
        opacity: 0;
        transform-origin: 50% 50%;
      }

      .draft-mark.one {
        left: 412px;
      }

      .draft-mark.two {
        left: 686px;
        height: 660px;
        top: 160px;
        transform: rotate(-40deg);
      }

      .draft-mark.three {
        left: 784px;
        height: 520px;
        top: 315px;
      }

      .vignette {
        z-index: 9;
        pointer-events: none;
        background:
          radial-gradient(circle at center, transparent 45%, rgba(0, 0, 0, 0.26) 78%, rgba(0, 0, 0, 0.62) 100%),
          linear-gradient(180deg, rgba(0, 0, 0, 0.28), transparent 18%, transparent 78%, rgba(0, 0, 0, 0.35));
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="10"
      data-width="1920"
      data-height="1080"
    >
      <div class="grid" data-layout-ignore></div>
      <div class="grain" data-layout-ignore></div>
      <div class="scan" data-layout-ignore></div>

      <div class="logo-stage">
        <div class="logo-wrap">
          <div class="logo-ghost" data-layout-ignore></div>

          <svg
            class="drawing-layer"
            viewBox="0 0 1500 950"
            aria-hidden="true"
            data-layout-ignore
          >
            <path class="draw-line architecture" pathLength="1000" d="M203 704 L203 408" />
            <path class="draw-line architecture" pathLength="1000" d="M240 699 L240 382" />
            <path class="draw-line architecture" pathLength="1000" d="M276 696 L276 355" />
            <path class="draw-line architecture" pathLength="1000" d="M310 690 L310 194 L606 437 L606 690" />
            <path class="draw-line architecture" pathLength="1000" d="M310 690 C396 642 514 630 728 636" />
            <path class="draw-line architecture" pathLength="1000" d="M172 702 L104 751" />
            <path class="draw-line architecture" pathLength="1000" d="M472 639 A43 43 0 1 1 471.8 638.9" />
            <path class="draw-line word" pathLength="1000" d="M820 454 L820 350 L854 350 L854 454" />
            <path class="draw-line word" pathLength="1000" d="M820 402 L940 402" />
            <path class="draw-line word" pathLength="1000" d="M976 455 C935 455 928 380 976 381 C1024 381 1018 455 976 455" />
            <path class="draw-line word" pathLength="1000" d="M1046 455 L1046 384 C1078 374 1092 391 1091 417" />
            <path class="draw-line word" pathLength="1000" d="M1134 455 L1134 384" />
            <path class="draw-line word" pathLength="1000" d="M1129 342 L1145 342" />
            <path class="draw-line word" pathLength="1000" d="M1180 384 L1272 384 L1186 455 L1276 455" />
            <path class="draw-line word" pathLength="1000" d="M1330 455 C1288 455 1284 381 1330 381 C1378 381 1375 455 1330 455" />
            <path class="draw-line word" pathLength="1000" d="M1414 455 L1414 384 C1450 374 1475 392 1474 455" />
            <path class="draw-line subword" pathLength="1000" d="M820 534 L875 534 M820 606 L875 606 M820 534 L820 606 M875 534 L875 606" />
            <path class="draw-line subword" pathLength="1000" d="M820 672 L875 672 M820 744 L875 744 M820 672 L820 744 M875 672 L875 744" />
            <path class="draw-line cn" pathLength="1000" d="M820 822 L1470 822" />
            <path class="draw-line cn" pathLength="1000" d="M842 780 L842 866 M902 780 L902 866 M962 780 L962 866 M1022 780 L1022 866 M1082 780 L1082 866 M1142 780 L1142 866 M1202 780 L1202 866 M1262 780 L1262 866 M1322 780 L1322 866 M1382 780 L1382 866 M1442 780 L1442 866" />

            <path class="flow-line" pathLength="1000" d="M80 758 C236 642 392 624 728 636" />
            <path class="flow-line" pathLength="1000" d="M310 194 L606 437 L606 690" />
            <path class="flow-line" pathLength="1000" d="M804 404 C1040 328 1248 374 1488 396" />
            <path class="flow-line" pathLength="1000" d="M808 818 C1038 778 1264 778 1490 820" />
            <path class="spark-line" pathLength="1000" d="M110 360 C196 300 236 272 310 194" />
            <path class="spark-line" pathLength="1000" d="M636 636 C780 560 846 520 920 404" />
            <path class="spark-line" pathLength="1000" d="M790 740 C1010 704 1234 704 1468 740" />
          </svg>

          <div class="draft-mark one" data-layout-ignore></div>
          <div class="draft-mark two" data-layout-ignore></div>
          <div class="draft-mark three" data-layout-ignore></div>
          <img class="logo-final" src="assets/horizon-logo.png" alt="Horizon Construction Decoration logo" />
        </div>
      </div>

      <div class="vignette" data-layout-ignore></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};

      const tl = gsap.timeline({ paused: true });

      gsap.set(".draw-line", { strokeDasharray: 1000, strokeDashoffset: 1000, opacity: 0 });
      gsap.set(".flow-line", { strokeDashoffset: 1000 });
      gsap.set(".spark-line", { strokeDashoffset: 1000 });

      tl.from(".logo-wrap", { scale: 0.972, opacity: 0, duration: 0.7, ease: "power2.out" }, 0.16);
      tl.from(".grid", { opacity: 0, scale: 1.08, duration: 1.0, ease: "sine.out" }, 0.2);
      tl.to(".grid", { x: 18, y: -10, scale: 1.025, duration: 8.4, ease: "none" }, 1.2);

      tl.to(".draft-mark", { opacity: 0.48, duration: 0.46, stagger: 0.16, ease: "power2.out" }, 0.35);
      tl.to(".draft-mark", { opacity: 0, duration: 0.7, stagger: 0.08, ease: "sine.inOut" }, 2.8);

      tl.to(".architecture", {
        opacity: 1,
        strokeDashoffset: 0,
        duration: 2.2,
        stagger: 0.16,
        ease: "power2.inOut",
      }, 0.55);

      tl.to(".flow-line", {
        opacity: 0.95,
        strokeDashoffset: -900,
        duration: 2.5,
        stagger: 0.32,
        ease: "none",
      }, 1.0);

      tl.to(".spark-line", {
        opacity: 0.85,
        strokeDashoffset: -760,
        duration: 1.8,
        stagger: 0.22,
        ease: "none",
      }, 1.4);

      tl.to(".word", {
        opacity: 0.92,
        strokeDashoffset: 0,
        duration: 1.55,
        stagger: 0.055,
        ease: "expo.inOut",
      }, 2.7);

      tl.to(".subword", {
        opacity: 0.8,
        strokeDashoffset: 0,
        duration: 1.2,
        stagger: 0.12,
        ease: "circ.inOut",
      }, 3.65);

      tl.to(".cn", {
        opacity: 0.72,
        strokeDashoffset: 0,
        duration: 1.3,
        stagger: 0.12,
        ease: "power3.inOut",
      }, 4.15);

      tl.to(".scan", { opacity: 0.82, duration: 0.36, ease: "power1.out" }, 4.55);
      tl.to(".scan", { x: 2480, duration: 1.35, ease: "power2.inOut" }, 4.55);
      tl.to(".scan", { opacity: 0, duration: 0.45, ease: "power1.in" }, 5.48);

      tl.fromTo(".logo-ghost", { scale: 1.018 }, { opacity: 0.38, scale: 1.004, duration: 0.75, ease: "sine.out" }, 5.05);
      tl.to(".logo-final", { opacity: 1, duration: 1.15, ease: "power2.out" }, 5.72);
      tl.to(".drawing-layer", { opacity: 0.34, duration: 1.0, ease: "sine.inOut" }, 5.9);
      tl.to(".logo-final", { scale: 1.012, duration: 1.4, ease: "expo.out" }, 5.9);

      tl.to(".flow-line, .spark-line", { opacity: 0, duration: 0.58, ease: "sine.in" }, 6.25);
      tl.to(".drawing-layer", { opacity: 0, duration: 0.9, ease: "power2.inOut" }, 7.0);
      tl.to(".logo-ghost", { opacity: 0.12, duration: 1.1, ease: "sine.inOut" }, 7.05);
      tl.to(".logo-final", { filter: "drop-shadow(0 0 36px rgba(247, 247, 242, 0.22))", duration: 1.3, ease: "sine.inOut" }, 7.1);

      tl.to(".logo-final", { scale: 1, duration: 1.0, ease: "power2.inOut" }, 8.3);
      tl.to(".logo-ghost", { opacity: 0, duration: 0.9, ease: "power2.in" }, 8.5);
      tl.to(".grain", { opacity: 0.16, duration: 0.9, ease: "sine.inOut" }, 8.65);
      tl.to(".grid", { opacity: 0.06, duration: 0.9, ease: "sine.inOut" }, 8.7);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
